<h2>Choose a Simple Icon Direction</h2>
<p class="subtitle">All three keep the same "monitoring" idea, but avoid drawing the whole toolbar UI.</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;align-items:center;justify-content:center;height:220px;background:linear-gradient(135deg,#e2e8f0 0%,#cbd5e1 100%);border-radius:24px;">
        <div style="width:136px;height:136px;border-radius:34px;background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);box-shadow:0 24px 48px rgba(15,23,42,.25);padding:26px;display:flex;align-items:flex-end;gap:10px;">
          <div style="width:18px;height:36px;border-radius:9px 9px 4px 4px;background:#94a3b8;"></div>
          <div style="width:18px;height:56px;border-radius:9px 9px 4px 4px;background:#38bdf8;"></div>
          <div style="width:18px;height:82px;border-radius:9px 9px 4px 4px;background:#22c55e;"></div>
          <div style="position:absolute;width:76px;height:3px;background:#f8fafc;transform:translate(18px,-58px) rotate(-24deg);transform-origin:left center;border-radius:3px;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. Bar + Trend</h3>
      <p>柱状图加趋势线，最直观地表达“系统监控”。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;align-items:center;justify-content:center;height:220px;background:linear-gradient(135deg,#dbeafe 0%,#bfdbfe 100%);border-radius:24px;">
        <div style="width:136px;height:136px;border-radius:34px;background:linear-gradient(180deg,#eff6ff 0%,#dbeafe 100%);box-shadow:0 24px 48px rgba(30,64,175,.18);position:relative;">
          <div style="position:absolute;left:24px;right:24px;top:28px;bottom:28px;border:5px solid #1d4ed8;border-radius:18px;"></div>
          <div style="position:absolute;left:38px;bottom:40px;width:12px;height:24px;border-radius:7px;background:#1d4ed8;"></div>
          <div style="position:absolute;left:58px;bottom:40px;width:12px;height:40px;border-radius:7px;background:#2563eb;"></div>
          <div style="position:absolute;left:78px;bottom:40px;width:12px;height:58px;border-radius:7px;background:#0ea5e9;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. App Window</h3>
      <p>更像原生应用图标，里面只放抽象监控图形。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="display:flex;align-items:center;justify-content:center;height:220px;background:linear-gradient(135deg,#ecfccb 0%,#d9f99d 100%);border-radius:24px;">
        <div style="width:136px;height:136px;border-radius:34px;background:linear-gradient(180deg,#111827 0%,#374151 100%);box-shadow:0 24px 48px rgba(17,24,39,.22);position:relative;">
          <div style="position:absolute;left:28px;right:28px;top:36px;height:6px;background:#4ade80;border-radius:6px;transform:rotate(-10deg);"></div>
          <div style="position:absolute;left:34px;bottom:28px;width:16px;height:42px;border-radius:8px;background:#84cc16;"></div>
          <div style="position:absolute;left:60px;bottom:28px;width:16px;height:60px;border-radius:8px;background:#22c55e;"></div>
          <div style="position:absolute;left:86px;bottom:28px;width:16px;height:32px;border-radius:8px;background:#bef264;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. Utility Accent</h3>
      <p>更有工具感，绿色强调“实时状态正常/在线”。</p>
    </div>
  </div>
</div>
